<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React без Node.js</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div id="root"></div>
    <script type="text/babel">
// ==========================================
function useTasks() {
    const [tasks, setTasks] = React.useState([]);
    const [loading, setLoading] = React.useState(true);
    const [error, setError] = React.useState(null);

    // Загрузка данных (GET)
    React.useEffect(() => {
        const fetchTasks = async () => {
            try {
                setLoading(true);  
                const response = await fetch('https://louis301.github.io/task-manager/todos.json');
                if (!response.ok) throw new Error('Ошибка сети');
                const data = await response.json();
                
                const formattedTasks = data.map(item => ({
                    id: item.id,
                    title: item.title,
                    completed: item.completed,
                    userName: `Сотрудник №${item.userId}`
                }));
                setTasks(formattedTasks);
            } catch (err) {
                setError(err.message);
            } finally {
                setLoading(false);
            }
        };
        fetchTasks();
    }, []);

    // Добавление (POST)
    const addTask = async (newTask) => {
        const taskToAdd = { ...newTask, id: Date.now(), completed: false };
        setTasks(prev => [taskToAdd, ...prev]);
        
        await fetch('https://louis301.github.io/task-manager/', {
            method: 'POST',
            body: JSON.stringify(taskToAdd),
            headers: { 'Content-type': 'application/json; charset=UTF-8' },
        });
    };

    // ИЗМЕНЕНИЕ СТАТУСА (PUT)
    const toggleTask = async (id) => {
        // 1. Мгновенно обновляем UI
        setTasks(prev => prev.map(task => 
            task.id === id ? { ...task, completed: !task.completed } : task
        ));

        // 2. Отправляем запрос на сервер
        const taskToUpdate = tasks.find(t => t.id === id);
        await fetch(`https://louis301.github.io/task-manager//${id}`, {
            method: 'PUT',
            body: JSON.stringify({ ...taskToUpdate, completed: !taskToUpdate.completed }),
            headers: { 'Content-type': 'application/json; charset=UTF-8' },
        });
    };

    // УДАЛЕНИЕ (DELETE)
    const deleteTask = async (id) => {
        setTasks(prev => prev.filter(task => task.id !== id));
        await fetch(`https://louis301.github.io/task-manager//${id}`, { 
            method: 'DELETE' 
        });
    };

    return { tasks, loading, error, addTask, toggleTask, deleteTask };
}

// ==========================================
function Header() {
    return (
        <nav className="navbar navbar-dark bg-dark mb-4">
            <div className="container">
                <span className="navbar-brand mb-0 h1">📋 Менеджер задач</span>
            </div>
        </nav>
    );
}

// ==========================================
function AddTaskForm({ onAdd }) {
    const [title, setTitle] = React.useState('');
    const [userName, setUserName] = React.useState('');

    const handleSubmit = () => {
        if (!title.trim()) {
            alert('Введите название задачи!');
            return;
        }
        onAdd({ title, userName: userName || 'Не назначен' });
        setTitle('');
        setUserName('');
    };

    return (
        <div className="card shadow-sm mb-4">
            <div className="card-body">
                <div className="row g-3">
                    <div className="col-md-5">
                        <input 
                            type="text" 
                            className="form-control" 
                            placeholder="Название задачи" 
                            value={title}
                            onChange={e => setTitle(e.target.value)} 
                        />
                    </div>
                    <div className="col-md-4">
                        <input 
                            type="text" 
                            className="form-control" 
                            placeholder="Исполнитель" 
                            value={userName}
                            onChange={e => setUserName(e.target.value)} 
                        />
                    </div>
                    <div className="col-md-3">
                        <button type="button" className="btn btn-primary w-100" onClick={handleSubmit}>
                            Добавить
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
}
// ==========================================
function TaskItem({ task, onToggle, onDelete }) {
    return (
        <li className="list-group-item d-flex justify-content-between align-items-center">
            <div className="d-flex align-items-center">
                <input 
                    type="checkbox" 
                    className="form-check-input me-3" 
                    style={{transform: 'scale(1.3)'}}
                    checked={task.completed} 
                    onChange={() => onToggle(task.id)} 
                />
                <div>
                    <h5 className={`m-0 ${task.completed ? 'text-decoration-line-through text-muted' : ''}`}>
                        {task.title}
                    </h5>
                    <small className="text-muted">Исполнитель: {task.userName}</small>
                </div>
            </div>
            <div>
                <span className={`badge ${task.completed ? 'bg-success' : 'bg-warning text-dark'} rounded-pill me-2`}>
                    {task.completed ? 'Выполнено' : 'В работе'}
                </span>
                <button className="btn btn-sm btn-outline-danger" onClick={() => onDelete(task.id)}>
                    Удалить
                </button>
            </div>
        </li>
    );
}
// ==========================================
function TaskList({ tasks, onToggle, onDelete }) {
    return (
        <div className="card shadow-sm">
            <div className="card-header bg-white d-flex justify-content-between">
                <h4 className="m-0">Список задач</h4>
                <span className="badge bg-secondary">Всего: {tasks.length}</span>
            </div>
            <ul className="list-group list-group-flush">
                {tasks.length === 0 ? (
                    <li className="list-group-item text-center text-muted">Задач пока нет...</li>
                ) : (
                    tasks.map(task => (
                        <TaskItem 
                            key={task.id} 
                            task={task} 
                            onToggle={onToggle} 
                            onDelete={onDelete}
                        />
                    ))
                )}
            </ul>
        </div>
    );
}

// ==========================================
function App() {
    const { tasks, loading, error, addTask, toggleTask, deleteTask } = useTasks();

    if (loading) return (
        <div className="container mt-5 text-center">
            <div className="spinner-border text-primary" role="status"></div>
            <p className="mt-2">Загрузка задач...</p>
        </div>
    );

    if (error) return (
        <div className="container mt-5">
            <div className="alert alert-danger">Ошибка загрузки: {error}</div>
        </div>
    );

    return (
        <>
            <Header />
            <div className="container pb-5">
                <AddTaskForm onAdd={addTask} />
                <TaskList 
                    tasks={tasks} 
                    onToggle={toggleTask} 
                    onDelete={deleteTask} 
                />
            </div>
        </>
    );
}

// ==========================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
    
</body>
</html>
