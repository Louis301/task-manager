<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аттестация: React Каталог + Корзина</title>
    
    <!-- React и Babel для работы прямо в браузере -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .hover-zoom { transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer; }
        .hover-zoom:hover { transform: scale(1.02); box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important; }
        /* Стили для декларативного модального окна */
        .modal-backdrop-custom {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.6); z-index: 1050;
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-light">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. НАВИГАЦИОННАЯ ПАНЕЛЬ
        // ==========================================
        function Header({ currentPage, setPage, cartCount }) {
            const navClass = (page) => `btn btn-link nav-link text-decoration-none ${currentPage === page ? 'active fw-bold text-white' : 'text-white-50'}`;
            
            return (
                <nav className="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
                    <div className="container">
                        <span className="navbar-brand mb-0 h1">🛒 React Store</span>
                        <div className="navbar-nav ms-auto d-flex flex-row">
                            <button className={navClass('catalog')} onClick={() => setPage('catalog')}>Каталог</button>
                            <button className={navClass('cart')} onClick={() => setPage('cart')}>
                                Корзина 
                                {cartCount > 0 && <span className="badge bg-danger ms-1 rounded-pill">{cartCount}</span>}
                            </button>
                            <button className={navClass('about')} onClick={() => setPage('about')}>О нас</button>
                        </div>
                    </div>
                </nav>
            );
        }

        // ==========================================
        // 2. МОДАЛЬНОЕ ОКНО (Декларативное)
        // ==========================================
        function ProductModal({ product, onClose }) {
            if (!product) return null;

            // e.stopPropagation() предотвращает закрытие модалки при клике на саму карточку
            return (
                <div className="modal-backdrop-custom" onClick={onClose}>
                    <div className="card shadow-lg border-0 p-3" style={{ maxWidth: '600px', width: '90%' }} onClick={e => e.stopPropagation()}>
                        <div className="d-flex justify-content-between align-items-start mb-3">
                            <h4 className="text-primary mb-0">{product.price} $</h4>
                            <button className="btn-close" onClick={onClose} aria-label="Close"></button>
                        </div>
                        <img src={product.image} className="img-fluid mx-auto d-block mb-3" style={{ maxHeight: '300px', objectFit: 'contain' }} alt={product.title} />
                        <span className="badge bg-secondary mb-2 text-uppercase align-self-start">{product.category}</span>
                        <h5 className="card-title">{product.title}</h5>
                        <p className="card-text text-muted">{product.description}</p>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. СОСТАВНЫЕ UI-КОМПОНЕНТЫ (Карточка товара)
        // ==========================================
        function ProductImage({ src, title, onClick }) {
            const [isHovered, setIsHovered] = React.useState(false);

            return (
                <div 
                    className="overflow-hidden bg-white position-relative"
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    onClick={onClick}
                    style={{ transform: isHovered ? 'scale(1.05)' : 'scale(1)', transition: 'transform 0.3s ease' }}
                >
                    <img src={src} className="card-img-top p-3" alt={title} style={{ height: '200px', objectFit: 'contain' }} />
                    {isHovered && (
                        <div className="position-absolute top-50 start-50 translate-middle badge bg-dark bg-opacity-75 p-2">
                            👁 Открыть
                        </div>
                    )}
                </div>
            );
        }

        function ProductBody({ title, category, description }) {
            return (
                <div className="card-body">
                    <span className="badge bg-secondary mb-2 text-uppercase">{category}</span>
                    <h5 className="card-title text-truncate" title={title}>{title}</h5>
                    <p className="card-text text-muted small" style={{ height: '60px', overflow: 'hidden' }}>{description}</p>
                </div>
            );
        }

        function ProductActions({ price, onAdd, isInCart }) {
            return (
                <div className="card-footer bg-white border-top-0 pb-3 pt-0">
                    <h4 className="text-primary mb-3">{price} $</h4>
                    <button 
                        className={`btn w-100 fw-bold ${isInCart ? 'btn-success' : 'btn-primary'}`}
                        onClick={(e) => {
                            e.stopPropagation(); // Чтобы не открывалась модалка при клике на кнопку
                            onAdd();
                        }}
                        disabled={isInCart}
                    >
                        {isInCart ? '✓ В корзине' : 'В корзину'}
                    </button>
                </div>
            );
        }

        function ProductCard({ product, onShowDetails, onAddToCart, isInCart }) {
            return (
                <div className="col-md-6 col-lg-4 mb-4">
                    <div className="card h-100 shadow-sm border-0 hover-zoom" onClick={() => onShowDetails(product)}>
                        <ProductImage src={product.image} title={product.title} />
                        <ProductBody title={product.title} category={product.category} description={product.description} />
                        <ProductActions price={product.price} onAdd={onAddToCart} isInCart={isInCart} />
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. СТРАНИЦЫ
        // ==========================================
        function CatalogPage({ onShowDetails, onAddToCart, cart }) {
            const [products, setProducts] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);

            React.useEffect(() => {
                const fetchProducts = async () => {
                    try {
                        const response = await fetch('https://fakestoreapi.com/products');
                        if (!response.ok) throw new Error('Ошибка сети');
                        const data = await response.json(); // Парсинг JSON
                        setProducts(data);
                    } catch (err) {
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchProducts();
            }, []);

            if (loading) return <div className="container mt-5 text-center"><div className="spinner-border text-primary"></div><p className="mt-2">Загрузка...</p></div>;
            if (error) return <div className="container mt-5"><div className="alert alert-danger">Ошибка: {error}</div></div>;

            return (
                <div className="container py-4">
                    <h2 className="mb-4 border-bottom pb-2">Каталог товаров</h2>
                    <div className="row">
                        {products.map(product => {
                            const isInCart = cart.some(item => item.id === product.id);
                            return (
                                <ProductCard 
                                    key={product.id} 
                                    product={product} 
                                    onShowDetails={onShowDetails}
                                    onAddToCart={() => onAddToCart(product)}
                                    isInCart={isInCart}
                                />
                            );
                        })}
                    </div>
                </div>
            );
        }

        function CartPage({ cart, onRemoveFromCart }) {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            if (cart.length === 0) {
                return (
                    <div className="container py-5 text-center">
                        <h3 className="text-muted">🛒 Ваша корзина пуста</h3>
                        <p>Перейдите в каталог, чтобы добавить товары.</p>
                    </div>
                );
            }

            return (
                <div className="container py-4">
                    <h2 className="mb-4 border-bottom pb-2">Корзина</h2>
                    <div className="row">
                        <div className="col-lg-8">
                            <div className="list-group shadow-sm">
                                {cart.map(item => (
                                    <div key={item.id} className="list-group-item d-flex align-items-center p-3">
                                        <img src={item.image} alt={item.title} style={{ width: '60px', height: '60px', objectFit: 'contain' }} className="me-3" />
                                        <div className="flex-grow-1">
                                            <h6 className="mb-1 text-truncate" style={{ maxWidth: '300px' }}>{item.title}</h6>
                                            <small className="text-muted">{item.price} $ x {item.quantity} шт.</small>
                                        </div>
                                        <div className="text-end">
                                            <h5 className="text-primary mb-2">{(item.price * item.quantity).toFixed(2)} $</h5>
                                            <button className="btn btn-sm btn-outline-danger" onClick={() => onRemoveFromCart(item.id)}>
                                                Удалить
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="col-lg-4 mt-4 mt-lg-0">
                            <div className="card shadow-sm border-0 p-3">
                                <h4>Итого к оплате:</h4>
                                <h2 className="text-primary display-6">{total.toFixed(2)} $</h2>
                                <button className="btn btn-success btn-lg w-100 mt-3">Оформить заказ</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function AboutPage() {
            return (
                <div className="container py-5">
                    <div className="card shadow-sm p-4 border-0">
                        <h2 className="mb-3">О проекте</h2>
                        <p>Демонстрация навыков: React (CDN), Fetch API, парсинг JSON, составные компоненты, управление состоянием (поднятие состояния вверх), события мыши.</p>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 5. ГЛАВНОЕ ПРИЛОЖЕНИЕ (Поднятие состояния)
        // ==========================================
        function App() {
            const [currentPage, setCurrentPage] = React.useState('catalog');
            const [cart, setCart] = React.useState([]);
            const [selectedProduct, setSelectedProduct] = React.useState(null);

            // Логика добавления в корзину (с учетом количества)
            const addToCart = (product) => {
                setCart(prevCart => {
                    const existingItem = prevCart.find(item => item.id === product.id);
                    if (existingItem) {
                        return prevCart.map(item => 
                            item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                        );
                    }
                    return [...prevCart, { ...product, quantity: 1 }];
                });
            };

            // Логика удаления из корзины
            const removeFromCart = (productId) => {
                setCart(prevCart => prevCart.filter(item => item.id !== productId));
            };

            // Подсчет общего количества товаров для бейджика в шапке
            const totalCartItems = cart.reduce((sum, item) => sum + item.quantity, 0);

            return (
                <>
                    <Header currentPage={currentPage} setPage={setCurrentPage} cartCount={totalCartItems} />
                    
                    <main>
                        {currentPage === 'catalog' && (
                            <CatalogPage 
                                onShowDetails={setSelectedProduct} 
                                onAddToCart={addToCart} 
                                cart={cart} 
                            />
                        )}
                        {currentPage === 'cart' && (
                            <CartPage cart={cart} onRemoveFromCart={removeFromCart} />
                        )}
                        {currentPage === 'about' && <AboutPage />}
                    </main>

                    {/* Модальное окно рендерится условно, если выбран товар */}
                    <ProductModal 
                        product={selectedProduct} 
                        onClose={() => setSelectedProduct(null)} 
                    />
                </>
            );
        }

        // ==========================================
        // 6. РЕНДЕРИНГ
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
